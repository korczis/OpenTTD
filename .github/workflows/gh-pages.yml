name: Deploy Zola site (GitHub Pages)

# Fork-specific workflow, not part of upstream OpenTTD's CI -- builds the
# Zola site under /zola and deploys it to GitHub Pages. See /zola/zola.toml
# and README.md for what this repository actually is (private research fork).

on:
  push:
    branches: [master]
    paths:
      - "zola/**"
      - ".github/workflows/gh-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Zola
        env:
          ZOLA_VERSION: "0.22.1"
        run: |
          curl -sL "https://github.com/getzola/zola/releases/download/v${ZOLA_VERSION}/zola-v${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | tar xz
          sudo mv zola /usr/local/bin/zola
          zola --version

      - name: Build site
        working-directory: zola
        run: zola build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: zola/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
